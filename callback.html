<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learious - Authorization Callback</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 720px; margin: 80px auto; padding: 0 20px; line-height: 1.7; color: #333; text-align: center; }
h1 { font-size: 28px; color: #222; }
p { font-size: 16px; color: #666; }
.code-box { background: #f4f4f4; border: 2px solid #0066cc; border-radius: 8px; padding: 16px; margin: 24px 0; font-family: monospace; font-size: 14px; word-break: break-all; user-select: all; cursor: pointer; }
.code-box:hover { background: #e8f0fe; }
.hint { font-size: 13px; color: #999; }
.error { color: #cc0000; }
a { color: #0066cc; }
</style>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
window.onload = function() {
  if (code) {
    document.getElementById('status').textContent = 'Authorization Successful!';
    document.getElementById('code-display').textContent = code;
    document.getElementById('code-section').style.display = 'block';
    document.getElementById('error-section').style.display = 'none';
  } else if (error) {
    document.getElementById('status').textContent = 'Authorization Failed';
    document.getElementById('error-msg').textContent = params.get('error_description') || error;
    document.getElementById('code-section').style.display = 'none';
    document.getElementById('error-section').style.display = 'block';
  }
};
function copyCode() {
  const code = document.getElementById('code-display').textContent;
  navigator.clipboard.writeText(code);
  document.getElementById('copy-hint').textContent = 'Copied!';
}
</script>
</head>
<body>
<h1 id="status">Processing authorization...</h1>

<div id="code-section" style="display:none;">
  <p>Copy the authorization code below and paste it into the terminal:</p>
  <div class="code-box" onclick="copyCode()" id="code-display"></div>
  <p class="hint" id="copy-hint">Click the code to copy</p>
</div>

<div id="error-section" style="display:none;">
  <p class="error" id="error-msg"></p>
</div>

<p><a href="index.html">Back to Learious</a></p>
</body>
</html>
